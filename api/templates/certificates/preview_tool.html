<!DOCTYPE html>
<html>
<head>
  <title>Certificate Simulator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    input, button { margin: 5px; padding: 8px; }
    img { display: block; margin-top: 20px; max-width: 100%; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>Certificate Preview Tool</h2>

  <form id="preview-form">
    <label>Name: <input type="text" name="trader_name" value="John Doe"></label><br>
    <label>Date: <input type="date" name="issue_date" /></label><br>
    <label>Name X: <input type="number" name="name_x" value="1200"></label>
    <label>Name Y: <input type="number" name="name_y" value="923"></label><br>
    <label>Date X: <input type="number" name="date_x" value="400"></label>
    <label>Date Y: <input type="number" name="date_y" value="1359"></label><br>
    <button type="submit">Generate Preview</button>
  </form>

  <img id="preview-image" src="" alt="Certificate Preview" />

  <script>
    const form = document.getElementById("preview-form");
    const preview = document.getElementById("preview-image");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(form);

      const response = await fetch("https://api.we-fund.com/cert-preview/render/", {
        method: "POST",
        body: formData,
      });

      const data = await response.json();
      preview.src = data.preview;
    });
  </script>
</body>
</html>
