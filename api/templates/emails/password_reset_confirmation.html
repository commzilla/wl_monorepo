<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WeFund | Password Changed Confirmation</title>
  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      padding: 40px;
      background: radial-gradient(circle at top left, #183442 30%, transparent 70%), 
                  radial-gradient(circle at bottom right, #183442 30%, transparent 70%);
      border-radius: 20px;
    }
    .logo {
      text-align: center;
    }
    .logo img {
      height: 120px;
      width: auto;
      margin-bottom: 30px;
    }
    .main-content {
      background: #fff;
      color: #000;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
    }
    h2 {
      color: #2E8AE0;
      text-align: center;
    }
    .footer {
      text-align: center;
      color: #bbb;
      font-size: 13px;
      margin-top: 20px;
    }
    .socials a {
      margin: 0 5px;
    }
    .socials img {
      height: 32px;
      width: 32px;
    }
    .support-link {
      color: #2E8AE0;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="https://framerusercontent.com/images/TLmG1D7JDrVZ3B3rGEJealXM4s.png" alt="WeFund Logo" />
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <h2>Your Password Has Been Changed</h2>
      <p>Hello {{ full_name }},</p>
      <p>This is a confirmation that your password has just been successfully reset.</p>
      <p>If you did not perform this action, please <a href="https://support.we-fund.com" class="support-link" target="_blank">contact our support team</a> immediately.</p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="socials" style="margin-bottom:10px;">
        <a href="https://www.facebook.com/profile.php?...id=61570505740670" target="_blank">
          <img src="https://app-rsrc.getbee.io/public/resources/social-networks-icon-sets/circle-color/facebook@2x.png" alt="Facebook" />
        </a>
        <a href="https://www.instagram.com/wefundofficial/" target="_blank">
          <img src="https://app-rsrc.getbee.io/public/resources/social-networks-icon-sets/circle-color/instagram@2x.png" alt="Instagram" />
        </a>
        <a href="https://www.youtube.com/@Wefundofficial" target="_blank">
          <img src="https://app-rsrc.getbee.io/public/resources/social-networks-icon-sets/circle-color/youtube@2x.png" alt="YouTube" />
        </a>
        <a href="https://x.com/wefundofficial" target="_blank">
          <img src="https://app-rsrc.getbee.io/public/resources/social-networks-icon-sets/circle-color/twitter@2x.png" alt="Twitter" />
        </a>
      </div>
      &copy; {{ now.year }} WeFund. All rights reserved.
    </div>

  </div>
</body>
</html>
