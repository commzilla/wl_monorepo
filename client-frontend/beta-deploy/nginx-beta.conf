server {
    listen 80;
    server_name beta-dashboard.we-fund.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name beta-dashboard.we-fund.com;

    ssl_certificate     /etc/nginx/ssl-certificates/beta-dashboard.we-fund.com.crt;
    ssl_certificate_key /etc/nginx/ssl-certificates/beta-dashboard.we-fund.com.key;

    root /var/www/beta-dashboard/dist;
    index index.html;

    # SPA fallback — all routes serve index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}
